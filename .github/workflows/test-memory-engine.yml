name: ci-memory

on:
  push:
    branches:
      - backend-clean
  workflow_dispatch:

jobs:
  test-memory:
    runs-on: ubuntu-latest

    env:
      GITHUB_ACTIONS: "true"
      PYTHONPATH: "."

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Run semantic memory tests
        run: python -m pytest -q tests/test_chat_semantic_memory.py

      - name: Run smoke test
        run: python app/smoke_test.py

      - name: Run memory regression
        run: python tests/run_memory_regression.py
